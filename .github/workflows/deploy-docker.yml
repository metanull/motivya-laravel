name: Deploy Docker to VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (SHA or "latest")'
        required: false
        type: string
        default: latest

concurrency:
  group: deploy-docker-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Docker Image to VPS
    runs-on: ubuntu-24.04
    environment:
      name: motivya.metanull.eu
      url: https://motivya.metanull.eu

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v6

      - name: Determine image tag
        id: tag
        run: echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Check VPS connectivity
        run: |
          nc -z -w 10 "${{ secrets.VPS_HOST }}" 22 || \
            { echo "::error::Cannot reach ${{ secrets.VPS_HOST }}:22"; exit 1; }

      - name: Verify SSH authentication
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 -o BatchMode=yes \
            "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" whoami || \
            { echo "::error::SSH auth failed — check VPS_SSH_KEY and VPS_SSH_USER"; exit 1; }

      - name: Upload compose file
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml \
            "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}:/opt/motivya/docker-compose.prod.yml"

      - name: Deploy
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
            IMAGE_TAG="${IMAGE_TAG}" bash -s <<'REMOTE'
            set -e
            cd /opt/motivya

            IMAGE_TAG="${IMAGE_TAG}" \
            docker compose --env-file .env -f docker-compose.prod.yml pull

            IMAGE_TAG="${IMAGE_TAG}" \
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans

            docker compose --env-file .env -f docker-compose.prod.yml \
              exec -T app php artisan migrate --force

            docker image prune -f
            echo "Deployed IMAGE_TAG=${IMAGE_TAG}"
          REMOTE

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST }}" \
            "docker compose --env-file /opt/motivya/.env \
               -f /opt/motivya/docker-compose.prod.yml ps"
