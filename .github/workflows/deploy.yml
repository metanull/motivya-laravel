name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04
    environment:
      name: motivya.metanull.eu
      url: https://motivya.metanull.eu

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, bcmath, intl, gd, zip, pcntl, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache NPM dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Install Node dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          debug: true
          script: |
            set -e

            APP_DIR="/opt/motivya/src"

            # Bootstrap: clone repo if first deploy
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "[DEPLOY] First deploy — cloning repository..."
              mkdir -p /opt/motivya
              git clone https://github.com/metanull/motivya-laravel.git "$APP_DIR"
            fi

            # Run the deploy script from the repo
            bash "$APP_DIR/scripts/deploy.sh"
