name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04
    environment:
      name: motivya.metanull.eu
      url: https://motivya.metanull.eu

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, bcmath, intl, gd, zip, pcntl, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache NPM dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Install Node dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify SSH key
        run: |
          echo "Key file info:"
          wc -c ~/.ssh/deploy_key
          head -1 ~/.ssh/deploy_key
          tail -1 ~/.ssh/deploy_key
          ssh-keygen -lf ~/.ssh/deploy_key || echo "FINGERPRINT FAILED"
          echo "---"
          file ~/.ssh/deploy_key

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          ssh -vvv -i ~/.ssh/deploy_key -o ConnectTimeout=30 "${VPS_USER}@${VPS_HOST}" bash -s <<'DEPLOY_SCRIPT'
            set -e

            APP_DIR="/opt/motivya/src"

            # Bootstrap: clone repo if first deploy
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "[DEPLOY] First deploy — cloning repository..."
              mkdir -p /opt/motivya
              git clone https://github.com/metanull/motivya-laravel.git "$APP_DIR"
            fi

            # Run the deploy script from the repo
            bash "$APP_DIR/scripts/deploy.sh"
          DEPLOY_SCRIPT
