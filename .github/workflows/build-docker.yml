name: Build Docker Image

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID (leave empty for latest successful)'
        required: false
        type: string

concurrency:
  group: build-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout (for .docker/ config files)
        uses: actions/checkout@v6

      - name: Determine artifact source
        id: source
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.run_id }}" ]]; then
            RUN_ID="${{ inputs.run_id }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RUN_ID=$(gh run list --workflow=ci.yml --branch=main \
              --status=success --limit=1 --json databaseId \
              --jq '.[0].databaseId')
            [[ -z "$RUN_ID" ]] && { echo "::error::No successful CI run found on main"; exit 1; }
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
          fi
          HEAD_SHA=$(gh run view "${RUN_ID}" --json headSha --jq '.headSha')
          echo "run_id=${RUN_ID}"   >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ steps.source.outputs.head_sha }}
          run-id: ${{ steps.source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker build context
        run: |
          mkdir -p /tmp/docker-context
          tar xzf release.tar.gz -C /tmp/docker-context
          # Overlay latest .docker/ from checkout (same SHA, but ensures Dockerfile is current)
          cp -r .docker /tmp/docker-context/.docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: /tmp/docker-context
          file: /tmp/docker-context/.docker/Dockerfile
          push: true
          tags: |
            ghcr.io/metanull/motivya-laravel:${{ steps.source.outputs.head_sha }}
            ghcr.io/metanull/motivya-laravel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
