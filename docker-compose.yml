services:
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - .docker/php/php.ini:/usr/local/etc/php/conf.d/99-dev.ini
    env_file: .docker/.env.docker
    environment:
      APP_NAME: Motivya
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8000"
      APP_LOCALE: fr
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: fr_BE
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: motivya
      DB_USERNAME: motivya
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: "noreply@motivya.test"
      MAIL_FROM_NAME: Motivya
    depends_on:
      mysql:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 10s
      retries: 3
    networks:
      - motivya

  nginx:
    image: nginx:1.26-alpine
    volumes:
      - .:/var/www/html
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "127.0.0.1:8000:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 10s
      retries: 3
    networks:
      - motivya

  mysql:
    image: mysql:8.0
    env_file: .docker/.env.docker
    ports:
      - "127.0.0.1:3336:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - .docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
    networks:
      - motivya

  valkey:
    image: valkey/valkey:8
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      retries: 3
    networks:
      - motivya

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      retries: 3
    networks:
      - motivya

volumes:
  mysql-data:
  valkey-data:

networks:
  motivya:
    driver: bridge
