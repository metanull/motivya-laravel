name: motivya-dev

services:
  app:
    build:
      context: .
      dockerfile: .docker/Dockerfile.dev
    volumes:
      - .:/var/www/app
      - vendor:/var/www/app/vendor
    environment:
      APP_NAME: Motivya
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_LOCALE: fr
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: fr_BE
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: motivya
      DB_USERNAME: motivya
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      MAIL_FROM_ADDRESS: noreply@motivya.test
      MAIL_FROM_NAME: Motivya
    depends_on:
      mysql:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks: [motivya-dev]

  web:
    image: nginx:1.26-alpine
    volumes:
      - .:/var/www/app:ro
      - .docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8000:80"
    depends_on:
      - app
    networks: [motivya-dev]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: motivya
      MYSQL_USER: motivya
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-dev:/var/lib/mysql
      - .docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:3336:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s
    networks: [motivya-dev]

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey-dev:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      retries: 3
    networks: [motivya-dev]

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    networks: [motivya-dev]

volumes:
  mysql-dev:
  valkey-dev:
  vendor:

networks:
  motivya-dev:
    driver: bridge
